<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>전국 파크골프 통합 예약 & 뉴스 시스템</title>
    <script>
        if (navigator.userAgent.match(/kakaotalk/i)) {
            location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(location.href);
        }
    </script>
    <style>
        :root { --primary: #2e7d32; --secondary: #4caf50; --bg: #f4f6f8; --accent: #ef6c00; --home: #1565c0; }
        body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 90px; }
        .hero-img { width: 100%; display: block; max-height: 280px; object-fit: cover; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .hero-caption { background: linear-gradient(180deg, #1b5e20, #2e7d32); color: #fff; text-align: center; padding: 10px 15px; font-size: 0.95em; line-height: 1.5; font-weight: 500; }
        .container { max-width: 800px; margin: auto; padding: 15px; }
        
        /* 뉴스 & 대회 섹션 */
        .news-box { background: white; border: 1px solid #c8e6c9; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .news-header { font-weight: bold; font-size: 1.1em; color: #d84315; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .reload-btn { background: #fff3e0; color: #d84315; border: 1px solid #ffcc80; padding: 5px 12px; border-radius: 15px; font-size: 0.85em; cursor: pointer; font-weight: bold; }
        .news-list { list-style: none; padding: 0; margin: 0; }
        .news-list li { margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px dashed #eee; }
        .news-link { text-decoration: none; color: #333; display: flex; justify-content: space-between; }
        .news-tag { font-size: 0.8em; font-weight: bold; padding: 2px 6px; border-radius: 4px; margin-right: 8px; }
        .tag-news { background: #e3f2fd; color: #1565c0; }
        .tag-event { background: #fce4ec; color: #c2185b; }
        .news-text { flex: 1; line-height: 1.4; word-break: keep-all; }
        .news-date { font-size: 12px; color: #0277BD; margin-left: 10px; white-space: nowrap; font-weight: bold; }
        .update-time { font-size: 12px; color: #888; text-align: right; margin-top: 15px; }
    </style>
</head>
<body>

<img class="hero-img" src="https://images.unsplash.com/photo-1593111774843-982846d03d01?q=80&w=1000&auto=format&fit=crop" alt="파크골프">
<div class="hero-caption">⛳ <b>전국 파크골프 통합 정보 센터</b></div>

<div class="container">
    <div class="news-box">
        <div class="news-header">
            <span>📢 최신 소식 및 대회 일정</span>
            <button class="reload-btn" onclick="loadNews(true)">↻ 새로고침</button>
        </div>
        <ul class="news-list" id="noticeContent"></ul>
        <div class="update-time" id="lastUpdate"></div>
    </div>
</div>

<script>
/* ── 뉴스 및 대회 데이터 (이곳을 수정하시면 됩니다) ── */
const NEWS_STORAGE_KEY = 'parkgolf_news_data';
const UPDATE_TIME_KEY = 'parkgolf_news_update';

function loadNews(force = false) {
    const now = new Date().getTime();
    const lastUpdate = localStorage.getItem(UPDATE_TIME_KEY);
    
    if (force || !lastUpdate || (now - lastUpdate > 86400000)) {
        const freshNotices = [
            /* 대회 스케줄 5개 */
            { type:"대회", title:"[대회] 제2회 문화체육관광부장관기 전국대회", date:"2026.06.10", region:"강원" },
            { type:"대회", title:"[대회] 경기도지사기 파크골프대회 (양평)", date:"2026.06.15", region:"수도권" },
            { type:"대회", title:"[대회] 울산광역시장기 전국 초청 파크골프대회", date:"2026.06.20", region:"영호남" },
            { type:"대회", title:"[대회] 제5회 충북협회장기 파크골프대회", date:"2026.06.25", region:"충청권" },
            { type:"대회", title:"[대회] 제3회 영호남 교류 파크골프 친선전", date:"2026.07.01", region:"영호남" },
            /* 뉴스 5개 */
            { type:"뉴스", title:"[수도권] 서울시, 노을 파크골프장 이용 시설 정비", date:"2026.05.23", region:"수도권" },
            { type:"뉴스", title:"[충청] 세종시, 금강변 신규 파크골프장 조성안 확정", date:"2026.05.22", region:"충청권" },
            { type:"뉴스", title:"[강원] 화천군, 산천어 파크골프장 야간 조명 설치", date:"2026.05.23", region:"강원" },
            { type:"뉴스", title:"[영호남] 대구광역시, 파크골프장 예약 시스템 개선", date:"2026.05.21", region:"영호남" },
            { type:"뉴스", title:"[전국] 파크골프협회, 혹서기 안전 가이드라인 배포", date:"2026.05.20", region:"전국" }
        ];
        localStorage.setItem(NEWS_STORAGE_KEY, JSON.stringify(freshNotices));
        localStorage.setItem(UPDATE_TIME_KEY, now);
    }
    
    const list = JSON.parse(localStorage.getItem(NEWS_STORAGE_KEY));
    const box = document.getElementById("noticeContent");
    const tagClass = (n) => n.type === '뉴스' ? 'tag-news' : 'tag-event';
    
    box.innerHTML = list.map(n => `
        <li>
            <a href="#" class="news-link">
                <span class="news-text">
                    <span class="news-tag ${tagClass(n)}">${n.type}</span>[${n.region}] ${n.title}
                </span>
                <span class="news-date">${n.date}</span>
            </a>
        </li>`).join('');
    document.getElementById("lastUpdate").textContent = "최종 업데이트: " + new Date().toLocaleString();
}

window.onload = () => { loadNews(); };
</script>

</body>
</html>
